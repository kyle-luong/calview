AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: calview serverless backend - Lambda + Step Functions + DynamoDB

Parameters:
  HashidSalt:
    Type: String
    NoEcho: true
  MapboxToken:
    Type: String
    NoEcho: true
    Default: ""
  GoogleMapsKey:
    Type: String
    NoEcho: true
    Default: ""
  AllowedOrigins:
    Type: String
    Default: "https://www.calview.me,https://calview.me,http://localhost:5173"
  SessionTtlDays:
    Type: Number
    Default: 30

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Tracing: Disabled
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        EVENTS_TABLE: !Ref EventsTable
        GEOCODE_CACHE_TABLE: !Ref GeocodeCacheTable
        CONTACT_TABLE: !Ref ContactTable
        RATE_LIMIT_TABLE: !Ref RateLimitTable
        RATE_LIMIT_PER_MIN: "30"
        UPLOAD_BUCKET: !Ref UploadBucket
        HASHID_SALT: !Ref HashidSalt
        MAPBOX_TOKEN: !Ref MapboxToken
        GOOGLE_MAPS_KEY: !Ref GoogleMapsKey
        SESSION_TTL_DAYS: !Ref SessionTtlDays
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        LOG_LEVEL: WARN

Resources:

  # ---------- Storage ----------
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shortId
          AttributeType: S
      KeySchema:
        - AttributeName: shortId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: sortKey
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: sortKey
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  GeocodeCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: locationHash
          AttributeType: S
      KeySchema:
        - AttributeName: locationHash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  ContactTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  RateLimitTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawIcs
            Status: Enabled
            ExpirationInDays: 7
            Prefix: uploads/
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [PUT, GET]
            AllowedOrigins: !Split [",", !Ref AllowedOrigins]
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---------- Shared layer ----------
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: shared/
      CompatibleRuntimes: [python3.12]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: python3.12

  # ---------- HTTP API ----------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowHeaders: ["*"]
        AllowMethods: [GET, POST, OPTIONS]
        MaxAge: 3000
      DefaultRouteSettings:
        ThrottlingRateLimit: 20
        ThrottlingBurstLimit: 40
      RouteSettings:
        "POST /api/sessions":
          ThrottlingRateLimit: 5
          ThrottlingBurstLimit: 10
        "POST /api/sessions/{shortId}/process":
          ThrottlingRateLimit: 5
          ThrottlingBurstLimit: 10
        "POST /api/distance-matrix":
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 20

  # ---------- Lambdas ----------
  CreateSessionFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/create_session/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SessionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
        - S3WritePolicy:      { BucketName: !Ref UploadBucket }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/sessions
            Method: POST

  StartWorkflowFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/start_workflow/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref ImportStateMachine
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SessionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
        - StepFunctionsExecutionPolicy: { StateMachineName: !GetAtt ImportStateMachine.Name }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/sessions/{shortId}/process
            Method: POST

  ParseIcsFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/parse_ics/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Timeout: 45
      MemorySize: 512
      Policies:
        - S3ReadPolicy: { BucketName: !Ref UploadBucket }

  GeocodeFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/geocode_locations/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Timeout: 90
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref GeocodeCacheTable }

  PersistEventsFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/persist_events/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SessionsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref EventsTable }

  GetSessionFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get_session/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref SessionsTable }
        - DynamoDBReadPolicy: { TableName: !Ref EventsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/sessions/{shortId}
            Method: GET

  GetStatusFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/get_status/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref SessionsTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/sessions/{shortId}/status
            Method: GET

  CommuteMatrixFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/commute_matrix/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/distance-matrix
            Method: POST

  ContactFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/contact_form/
      Handler: app.handler
      Layers: [!Ref SharedLayer]
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref ContactTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RateLimitTable }
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/contact
            Method: POST

  # ---------- Step Functions ----------
  ImportStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Type: EXPRESS
      DefinitionUri: statemachine/import_session.asl.json
      DefinitionSubstitutions:
        ParseIcsArn: !GetAtt ParseIcsFn.Arn
        GeocodeArn: !GetAtt GeocodeFn.Arn
        PersistArn: !GetAtt PersistEventsFn.Arn
        SessionsTable: !Ref SessionsTable
      Policies:
        - LambdaInvokePolicy: { FunctionName: !Ref ParseIcsFn }
        - LambdaInvokePolicy: { FunctionName: !Ref GeocodeFn }
        - LambdaInvokePolicy: { FunctionName: !Ref PersistEventsFn }
        - DynamoDBCrudPolicy: { TableName: !Ref SessionsTable }
      Logging:
        Level: ERROR
        IncludeExecutionData: false
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn

  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 3

  # ---------- Frontend hosting (S3 + CloudFront) ----------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        Origins:
          - Id: s3-frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: { OriginAccessIdentity: "" }
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-frontend
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  FrontendBucketName:
    Value: !Ref FrontendBucket
  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution
  CloudFrontDomain:
    Value: !GetAtt FrontendDistribution.DomainName
  UploadBucketName:
    Value: !Ref UploadBucket
