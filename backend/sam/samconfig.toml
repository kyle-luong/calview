version = 0.1

[default.global.parameters]
stack_name = "calview"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
region = "us-east-1"
parameter_overrides = [
    "HashidSalt=changeme",
    "AllowedOrigins=https://www.calview.me,https://calview.me,http://localhost:5173",
]
