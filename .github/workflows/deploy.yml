name: Deploy calview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: calview

jobs:
  check-frontend:
    name: Lint & Test Frontend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test

  deploy-backend:
    name: Deploy SAM Backend
    runs-on: ubuntu-latest
    needs: [check-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cf_id: ${{ steps.outputs.outputs.cf_id }}
    defaults: { run: { working-directory: backend/sam } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: aws-actions/setup-sam@v2
        with: { use-installer: true }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: sam build --use-container
      - name: Deploy
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              HashidSalt='${{ secrets.HASHID_SALT }}' \
              MapboxToken='${{ secrets.MAPBOX_TOKEN }}' \
              GoogleMapsKey='${{ secrets.GOOGLE_MAPS_KEY }}' \
              AllowedOrigins='${{ secrets.ALLOWED_ORIGINS }}'
      - id: outputs
        run: |
          q() { aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          {
            echo "api_url=$(q ApiUrl)"
            echo "frontend_bucket=$(q FrontendBucketName)"
            echo "cf_id=$(q CloudFrontDistributionId)"
          } >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ needs.deploy-backend.outputs.api_url }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws s3 sync dist/ "s3://${{ needs.deploy-backend.outputs.frontend_bucket }}" --delete
      - run: aws cloudfront create-invalidation --distribution-id "${{ needs.deploy-backend.outputs.cf_id }}" --paths "/*"
